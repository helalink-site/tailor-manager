<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Settings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root{--paper:#F3EEE4;--ink:#211D1A;--thread:#7A2E33;--thread-dark:#5E2227;--brass:#B7924B;--slate:#5B6560;--sage:#4F7A5B;--rust:#B5542A;}
body{background:var(--paper);color:var(--ink);font-family:'Work Sans',sans-serif;}
h1,h2,h3,h4,h5,h6{font-family:'Fraunces',serif;}
table,.badge,input[type=number],input[type=date],input[type=time]{font-family:'JetBrains Mono',monospace;}
.brand-title{font-style:italic;font-weight:700;}
.card{background:#fff;border:none;border-radius:6px;box-shadow:0 1px 3px rgba(33,29,26,.08);}
.btn-dark{background:var(--thread);border-color:var(--thread);border-radius:999px;font-weight:600;letter-spacing:.02em;}
.btn-dark:hover{background:var(--thread-dark);border-color:var(--thread-dark);}
.btn-success{background:var(--sage);border-color:var(--sage);border-radius:999px;}
.btn-outline-dark{border-color:var(--ink);color:var(--ink);border-radius:999px;}
.form-control,.form-select{border-radius:8px;border:1px solid #DDD4C4;background:#FFFDF9;}
.form-control:focus,.form-select:focus{border-color:var(--thread);box-shadow:0 0 0 .2rem rgba(122,46,51,.12);}
.navbar{background:var(--ink)!important;}
.navbar-brand{color:var(--paper)!important;}
.nav-link{color:var(--paper)!important;opacity:.85;}
.nav-link:hover{opacity:1;color:var(--brass)!important;}
.page-title{font-style:italic;font-weight:700;margin-bottom:1.25rem;}
.accordion-button:not(.collapsed){background:rgba(122,46,51,.06);color:var(--thread-dark);}
.accordion-button:focus{box-shadow:none;}
.table thead th{font-family:'Work Sans',sans-serif;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em;color:var(--slate);border-bottom:2px solid var(--brass)!important;}
.badge.bg-success{background-color:var(--sage)!important;}
.badge.bg-secondary{background-color:var(--slate)!important;}
.badge.bg-warning{background-color:var(--brass)!important;color:var(--ink)!important;}
.badge.bg-danger{background-color:var(--rust)!important;}
@media (max-width: 576px){
  .container{padding-left:12px;padding-right:12px;}
  h3{font-size:1.25rem;}
  .table{font-size:.85rem;}
  .card{padding:.75rem!important;}
  .navbar-brand{font-size:1rem;}
  #notif-dropdown{min-width:260px!important;}
}
.table-responsive .table{white-space:nowrap;}
.table-responsive .table td small{white-space:normal;}
</style>
</head>
<body>
<div id="nav-container"></div>
<div class="container py-4">
  <h3 class="page-title">Admin Settings</h3>

  <div class="row">
    <div class="col-md-6 mb-4">
      <div class="card p-3 bg-white shadow-sm">
        <h6 class="text-muted">Branding</h6>
        <form id="branding-form">
          <div class="mb-2"><label class="form-label">System Name</label><input type="text" id="system_name" class="form-control"></div>
          <div class="mb-2">
            <label class="form-label">Logo Image</label>
            <input type="file" id="logo_file" class="form-control" accept="image/*">
            <div id="logo-preview-wrap" class="mt-2"></div>
          </div>
          <button class="btn btn-dark btn-sm">Save Branding</button>
        </form>
      </div>

      <div class="card p-3 bg-white shadow-sm mt-3">
        <h6 class="text-muted">Permissions & Schedule</h6>
        <form id="permissions-form">
          <div class="form-check mb-2">
            <input type="checkbox" class="form-check-input" id="workers_can_view_payments">
            <label class="form-check-label" for="workers_can_view_payments">Workers can see payment amounts & balances</label>
          </div>
          <div class="form-check mb-3">
            <input type="checkbox" class="form-check-input" id="workers_can_view_financials">
            <label class="form-check-label" for="workers_can_view_financials">Workers can see the Financials section</label>
          </div>
          <div class="row g-2 mb-2">
            <div class="col-6">
              <label class="form-label small">Daily work-status reminder time</label>
              <input type="time" id="daily_reminder_time" class="form-control form-control-sm">
            </div>
            <div class="col-6">
              <label class="form-label small">Financial report time</label>
              <input type="time" id="financial_report_time" class="form-control form-control-sm">
            </div>
          </div>
          <div class="mb-2">
            <label class="form-label small">Financial report frequency</label>
            <select id="financial_report_frequency" class="form-select form-select-sm">
              <option value="daily">Daily</option>
              <option value="monthly">Monthly</option>
              <option value="yearly">Yearly</option>
            </select>
          </div>
          <button class="btn btn-dark btn-sm">Save Permissions & Schedule</button>
        </form>
      </div>
    </div>

    <div class="col-md-6 mb-4">
      <div class="card p-3 bg-white shadow-sm">
        <h6 class="text-muted">Add Staff</h6>
        <p class="small text-muted">Creates their login and profile in one step — no need to open Supabase.</p>
        <div id="staff-error" class="alert alert-danger d-none py-2 small"></div>
        <form id="staff-form">
          <div class="row g-2">
            <div class="col-6"><input type="text" id="new_name" class="form-control" placeholder="Full name" required></div>
            <div class="col-6"><input type="email" id="new_email" class="form-control" placeholder="Email" required></div>
            <div class="col-6"><input type="text" id="new_phone" class="form-control" placeholder="Phone (07XXXXXXXX)" required></div>
            <div class="col-6"><input type="password" id="new_password" class="form-control" placeholder="Password" required></div>
            <div class="col-6">
              <select id="new_role" class="form-select">
                <option value="staff">Staff</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <div class="col-12"><button class="btn btn-dark w-100" id="staff-submit-btn">Add Staff</button></div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="card p-3 bg-white shadow-sm mb-4">
    <h6 class="text-muted">Staff</h6>
    <div class="table-responsive"><table class="table table-sm">
      <thead><tr><th>Name</th><th>Phone</th><th>Role</th><th>Status</th><th></th></tr></thead>
      <tbody id="staff-body"></tbody>
    </table></div>
  </div>

  <div class="card p-3 bg-white shadow-sm mb-4">
    <h6 class="text-muted">Worker Workload</h6>
    <div class="table-responsive"><table class="table table-sm">
      <thead><tr><th>Worker</th><th>Pending Tasks</th></tr></thead>
      <tbody id="workload-body"></tbody>
    </table></div>
  </div>

  <div class="card p-3 bg-white shadow-sm">
    <h6 class="text-muted">Who gets notified for what</h6>
    <div class="table-responsive"><table class="table table-sm text-center">
      <thead><tr><th class="text-start">Staff</th><th>New Order</th><th>Payment Received</th><th>Order Completed</th><th>Daily Reminder</th></tr></thead>
      <tbody id="matrix-body"></tbody>
    </table></div>
    <button class="btn btn-dark btn-sm" id="save-matrix">Save Notification Settings</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ---------- Supabase config: update these two lines if the project changes ----------
const SUPABASE_URL = "https://zyzyatnnzrztdwqujkgl.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5enlhdG5uenJ6dGR3cXVqa2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0MTQ3MjksImV4cCI6MjA5OTk5MDcyOX0.-BF4qH0fVfdfxZ9IR1LzNWcFec4A6FIznBryjGywfVU";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function phoneToEmail(phone) {
  const digits = phone.replace(/\D/g, "");
  return `${digits}@tailor.local`;
}
async function logout() {
  await sb.auth.signOut();
  window.location.href = "index.html";
}
async function getCurrentStaff() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return null;
  const { data, error } = await sb.from("staff").select("*").eq("id", session.user.id).single();
  if (error || !data || !data.active) return null;
  return data;
}
async function requireAuth({ adminOnly = false } = {}) {
  const staff = await getCurrentStaff();
  if (!staff) { window.location.href = "index.html"; return null; }
  if (adminOnly && staff.role !== "admin") { window.location.href = "dashboard.html"; return null; }
  return staff;
}
async function getSettings() {
  const { data } = await sb.from("system_settings").select("*").limit(1).single();
  return data || { system_name: "Tailor Manager", logo_url: null };
}
function orderNo(id) {
  return String(id).padStart(3, "0");
}

async function renderNav(staff) {
  const settings = await getSettings();
  document.title = settings.system_name;
  const isAdmin = staff.role === "admin";
  const showFinancials = isAdmin || settings.workers_can_view_financials;
  const navHtml = `
    <nav class="navbar navbar-dark navbar-expand-lg">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2 brand-title" href="dashboard.html">
          ${settings.logo_url ? `<img src="${settings.logo_url}" height="30" style="border-radius:4px;">` : "&#9986;"}
          ${settings.system_name}
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="orders.html">Orders</a></li>
            <li class="nav-item"><a class="nav-link" href="trash.html">Trash</a></li>
            ${isAdmin ? `<li class="nav-item"><a class="nav-link" href="new-order.html">+ New Order</a></li>` : ""}
            ${showFinancials ? `<li class="nav-item"><a class="nav-link" href="financials.html">Financials</a></li>` : ""}
            ${isAdmin ? `<li class="nav-item"><a class="nav-link" href="admin.html">Admin Settings</a></li>` : ""}
          </ul>
          <ul class="navbar-nav align-items-center">
            <li class="nav-item dropdown">
              <a class="nav-link position-relative" href="#" id="bell" role="button" data-bs-toggle="dropdown">
                &#128276;<span id="badge-count" class="badge rounded-pill bg-danger position-absolute d-none" style="top:0;right:0;font-size:.65rem;"></span>
              </a>
              <ul class="dropdown-menu dropdown-menu-end p-2" style="min-width:320px;max-height:400px;overflow-y:auto;" id="notif-dropdown">
                <li class="text-muted small px-2">Loading...</li>
              </ul>
            </li>
            <li class="nav-item"><a class="nav-link" href="profile.html">${staff.avatar_url ? `<img src="${staff.avatar_url}" height="24" style="border-radius:50%;object-fit:cover;width:24px;">` : ""} ${staff.name}</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
          </ul>
        </div>
      </div>
    </nav>`;
  document.getElementById("nav-container").innerHTML = navHtml;
  initNotifications(staff.id);
}

async function loadNotifications(staffId) {
  const { data: notes } = await sb.from("notifications").select("*").eq("staff_id", staffId).order("created_at", { ascending: false }).limit(10);
  const { count: unread } = await sb.from("notifications").select("*", { count: "exact", head: true }).eq("staff_id", staffId).eq("is_read", false);
  const badge = document.getElementById("badge-count");
  if (unread > 0) { badge.textContent = unread; badge.classList.remove("d-none"); }
  else { badge.classList.add("d-none"); }
  const dropdown = document.getElementById("notif-dropdown");
  if (!notes || notes.length === 0) { dropdown.innerHTML = `<li class="text-muted small px-2">No notifications yet.</li>`; return; }
  dropdown.innerHTML = notes.map(n => `
    <li class="px-2 py-1 border-bottom ${n.is_read ? "" : "fw-bold"}" style="cursor:pointer;font-size:.85rem;" onclick="openNotification(${n.id}, ${n.order_id ?? "null"})">
      ${n.message}
      <div class="small text-muted fw-normal">${new Date(n.created_at).toLocaleString()}</div>
    </li>`).join("");
}
async function openNotification(id, orderId) {
  await sb.from("notifications").update({ is_read: true }).eq("id", id);
  window.location.href = orderId ? `order.html?id=${orderId}` : "dashboard.html";
}
function initNotifications(staffId) {
  loadNotifications(staffId);
  sb.channel("notifications-" + staffId)
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "notifications", filter: `staff_id=eq.${staffId}` }, () => loadNotifications(staffId))
    .subscribe();
}

const EVENT_TYPES = ["new_order", "payment_received", "order_completed", "daily_reminder"];
let me = null;

async function loadStaffTable() {
  const { data: staffList } = await sb.from("staff").select("*").order("created_at");
  document.getElementById("staff-body").innerHTML = staffList.map(s => `
    <tr>
      <td>${s.name}</td><td>${s.phone}</td><td>${s.role}</td>
      <td>${s.active ? `<span class="badge bg-success">Active</span>` : `<span class="badge bg-secondary">Disabled</span>`}</td>
      <td>${s.id === me.id ? "" : `<button class="btn btn-sm btn-outline-dark" onclick="toggleActive('${s.id}', ${s.active})">${s.active ? "Disable" : "Enable"}</button>`}</td>
    </tr>`).join("");
  return staffList;
}

async function toggleActive(id, current) {
  await sb.from("staff").update({ active: !current }).eq("id", id);
  init();
}

async function loadMatrix(staffList) {
  const { data: settings } = await sb.from("notification_settings").select("*");
  const lookup = {};
  (settings || []).forEach(s => { lookup[`${s.staff_id}_${s.event_type}`] = s.enabled; });
  document.getElementById("matrix-body").innerHTML = staffList.map(s => `
    <tr>
      <td class="text-start">${s.name}</td>
      ${EVENT_TYPES.map(et => {
        const key = `${s.id}_${et}`;
        const checked = lookup.hasOwnProperty(key) ? lookup[key] : true;
        return `<td><input type="checkbox" data-staff="${s.id}" data-event="${et}" ${checked ? "checked" : ""}></td>`;
      }).join("")}
    </tr>`).join("");
}

async function saveMatrix() {
  const checkboxes = document.querySelectorAll("#matrix-body input[type=checkbox]");
  for (const cb of checkboxes) {
    await sb.from("notification_settings").upsert(
      { staff_id: cb.dataset.staff, event_type: cb.dataset.event, enabled: cb.checked },
      { onConflict: "staff_id,event_type" }
    );
  }
  alert("Notification settings saved.");
}

async function loadWorkload(staffList) {
  const { data: pendingOrders } = await sb.from("orders").select("assigned_to").neq("status", "completed");
  const counts = {};
  (pendingOrders || []).forEach(o => { counts[o.assigned_to] = (counts[o.assigned_to] || 0) + 1; });
  document.getElementById("workload-body").innerHTML = staffList
    .filter(s => s.role !== "admin" || counts[s.id])
    .map(s => `<tr><td>${s.name} (${s.phone})</td><td>${counts[s.id] || 0}</td></tr>`).join("");
}

async function init() {
  const staffList = await loadStaffTable();
  await loadMatrix(staffList);
  await loadWorkload(staffList);
}

(async () => {
  me = await requireAuth({ adminOnly: true });
  if (!me) return;
  renderNav(me);

  const settings = await getSettings();
  document.getElementById("system_name").value = settings.system_name || "";
  document.getElementById("logo-preview-wrap").innerHTML = settings.logo_url
    ? `<img src="${settings.logo_url}" height="50" style="border-radius:4px;">` : "";
  document.getElementById("workers_can_view_payments").checked = !!settings.workers_can_view_payments;
  document.getElementById("workers_can_view_financials").checked = !!settings.workers_can_view_financials;
  document.getElementById("daily_reminder_time").value = (settings.daily_reminder_time || "18:00").slice(0,5);
  document.getElementById("financial_report_time").value = (settings.financial_report_time || "19:00").slice(0,5);
  document.getElementById("financial_report_frequency").value = settings.financial_report_frequency || "daily";

  await init();
})();

document.getElementById("branding-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const { data: existing } = await sb.from("system_settings").select("*").limit(1).single();
  let logoUrl = existing.logo_url;

  const file = document.getElementById("logo_file").files[0];
  if (file) {
    try {
      const ext = file.name.split(".").pop();
      const path = `branding/logo-${Date.now()}.${ext}`;
      const { error: uploadErr } = await sb.storage.from("public-assets").upload(path, file, { upsert: true });
      if (uploadErr) throw uploadErr;
      const { data: urlData } = sb.storage.from("public-assets").getPublicUrl(path);
      logoUrl = urlData.publicUrl;
    } catch (err) {
      alert("Logo upload failed: " + err.message);
      return;
    }
  }

  await sb.from("system_settings").update({
    system_name: document.getElementById("system_name").value.trim(),
    logo_url: logoUrl,
  }).eq("id", existing.id);
  alert("Branding updated.");
  location.reload();
});

document.getElementById("permissions-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const { data: existing } = await sb.from("system_settings").select("id").limit(1).single();
  await sb.from("system_settings").update({
    workers_can_view_payments: document.getElementById("workers_can_view_payments").checked,
    workers_can_view_financials: document.getElementById("workers_can_view_financials").checked,
    daily_reminder_time: document.getElementById("daily_reminder_time").value,
    financial_report_time: document.getElementById("financial_report_time").value,
    financial_report_frequency: document.getElementById("financial_report_frequency").value,
  }).eq("id", existing.id);
  alert("Permissions & schedule updated.");
});

document.getElementById("staff-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errorBox = document.getElementById("staff-error");
  errorBox.classList.add("d-none");
  const btn = document.getElementById("staff-submit-btn");
  btn.disabled = true; btn.textContent = "Adding...";

  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/create-staff`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${session.access_token}`,
      },
      body: JSON.stringify({
        name: document.getElementById("new_name").value.trim(),
        email: document.getElementById("new_email").value.trim(),
        phone: document.getElementById("new_phone").value.trim(),
        password: document.getElementById("new_password").value,
        role: document.getElementById("new_role").value,
      }),
    });
    const result = await res.json();
    if (!res.ok) throw new Error(result.error || "Failed to add staff");

    document.getElementById("staff-form").reset();
    init();
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.classList.remove("d-none");
  } finally {
    btn.disabled = false; btn.textContent = "Add Staff";
  }
});

document.getElementById("save-matrix").addEventListener("click", saveMatrix);
</script>
</body>
</html>
