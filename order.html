<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root{--paper:#F3EEE4;--ink:#211D1A;--thread:#7A2E33;--thread-dark:#5E2227;--brass:#B7924B;--slate:#5B6560;--sage:#4F7A5B;--rust:#B5542A;}
body{background:var(--paper);color:var(--ink);font-family:'Work Sans',sans-serif;}
h1,h2,h3,h4,h5,h6{font-family:'Fraunces',serif;}
table,.badge,input[type=number],input[type=date],input[type=time]{font-family:'JetBrains Mono',monospace;}
.brand-title{font-style:italic;font-weight:700;}
.card{background:#fff;border:none;border-top:3px dashed var(--brass);border-radius:6px;box-shadow:0 1px 3px rgba(33,29,26,.08);}
.btn-dark{background:var(--thread);border-color:var(--thread);border-radius:999px;font-weight:600;letter-spacing:.02em;}
.btn-dark:hover{background:var(--thread-dark);border-color:var(--thread-dark);}
.btn-success{background:var(--sage);border-color:var(--sage);border-radius:999px;}
.btn-outline-dark{border-color:var(--ink);color:var(--ink);border-radius:999px;}
.form-control,.form-select{border-radius:8px;border:1px solid #DDD4C4;background:#FFFDF9;}
.form-control:focus,.form-select:focus{border-color:var(--thread);box-shadow:0 0 0 .2rem rgba(122,46,51,.12);}
.navbar{background:var(--ink)!important;border-bottom:2px dashed var(--brass);}
.navbar-brand{color:var(--paper)!important;}
.nav-link{color:var(--paper)!important;opacity:.85;}
.nav-link:hover{opacity:1;color:var(--brass)!important;}
.page-title{font-style:italic;font-weight:700;border-bottom:2px dashed var(--brass);padding-bottom:.5rem;margin-bottom:1.25rem;}
.accordion-button:not(.collapsed){background:rgba(122,46,51,.06);color:var(--thread-dark);}
.accordion-button:focus{box-shadow:none;}
.table thead th{font-family:'Work Sans',sans-serif;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em;color:var(--slate);border-bottom:2px solid var(--brass)!important;}
.badge.bg-success{background-color:var(--sage)!important;}
.badge.bg-secondary{background-color:var(--slate)!important;}
.badge.bg-warning{background-color:var(--brass)!important;color:var(--ink)!important;}
.badge.bg-danger{background-color:var(--rust)!important;}
@media (max-width: 576px){
  .container{padding-left:12px;padding-right:12px;}
  h3{font-size:1.25rem;}
  .table{font-size:.85rem;}
  .card{padding:.75rem!important;}
  .navbar-brand{font-size:1rem;}
  #notif-dropdown{min-width:260px!important;}
}
.table-responsive .table{white-space:nowrap;}
.table-responsive .table td small{white-space:normal;}
</style>
</head>
<body>
<div id="nav-container"></div>
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="page-title mb-0" id="order-title">Loading…</h3>
    <div id="complete-action"></div>
  </div>

  <div class="row">
    <div class="col-md-7">
      <div class="card p-3 mb-3 bg-white shadow-sm">
        <h6 class="text-muted">Order Info</h6>
        <div class="table-responsive"><table class="table table-sm mb-0" id="info-table"></table></div>
      </div>
      <div class="card p-3 bg-white shadow-sm">
        <h6 class="text-muted">Payment History</h6>
        <div class="table-responsive"><table class="table table-sm">
          <thead><tr><th>Date</th><th>Amount</th><th>Method</th><th>Recorded By</th></tr></thead>
          <tbody id="payments-body"></tbody>
        </table></div>
        <div id="payment-form-container"></div>
      </div>
    </div>
    <div class="col-md-5">
      <div class="card p-3 bg-white shadow-sm text-center">
        <h6 class="text-muted">Total</h6>
        <h3 id="total-amount">KES 0</h3>
        <hr>
        <div class="row">
          <div class="col-6"><div class="text-muted small">Paid</div><div class="fs-5 text-success" id="paid-amount">KES 0</div></div>
          <div class="col-6"><div class="text-muted small">Balance</div><div class="fs-5" id="balance-amount">KES 0</div></div>
        </div>
        <hr>
        <div id="payment-status-badge"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://zyzyatnnzrztdwqujkgl.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5enlhdG5uenJ6dGR3cXVqa2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0MTQ3MjksImV4cCI6MjA5OTk5MDcyOX0.-BF4qH0fVfdfxZ9IR1LzNWcFec4A6FIznBryjGywfVU";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function logout() {
  await sb.auth.signOut();
  window.location.href = "index.html";
}
async function getCurrentStaff() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return null;
  const { data, error } = await sb.from("staff").select("*").eq("id", session.user.id).single();
  if (error || !data || !data.active) return null;
  return data;
}
async function requireAuth({ adminOnly = false } = {}) {
  const staff = await getCurrentStaff();
  if (!staff) { window.location.href = "index.html"; return null; }
  if (adminOnly && staff.role !== "admin") { window.location.href = "dashboard.html"; return null; }
  return staff;
}
async function getSettings() {
  const { data } = await sb.from("system_settings").select("*").limit(1).single();
  return data || { system_name: "Tailor Manager", logo_url: null };
}

async function renderNav(staff) {
  const settings = await getSettings();
  document.title = settings.system_name;
  const isAdmin = staff.role === "admin";
  const showFinancials = isAdmin || settings.workers_can_view_financials;
  const navHtml = `
    <nav class="navbar navbar-dark navbar-expand-lg">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2 brand-title" href="dashboard.html">
          ${settings.logo_url ? `<img src="${settings.logo_url}" height="30" style="border-radius:4px;">` : "&#9986;"}
          ${settings.system_name}
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="orders.html">Orders</a></li>
            ${isAdmin ? `<li class="nav-item"><a class="nav-link" href="new-order.html">+ New Order</a></li>` : ""}
            ${showFinancials ? `<li class="nav-item"><a class="nav-link" href="financials.html">Financials</a></li>` : ""}
            ${isAdmin ? `<li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li>` : ""}
          </ul>
          <ul class="navbar-nav align-items-center">
            <li class="nav-item dropdown">
              <a class="nav-link position-relative" href="#" id="bell" role="button" data-bs-toggle="dropdown">
                &#128276;<span id="badge-count" class="badge rounded-pill bg-danger position-absolute d-none" style="top:0;right:0;font-size:.65rem;"></span>
              </a>
              <ul class="dropdown-menu dropdown-menu-end p-2" style="min-width:320px;max-height:400px;overflow-y:auto;" id="notif-dropdown">
                <li class="text-muted small px-2">Loading...</li>
              </ul>
            </li>
            <li class="nav-item"><a class="nav-link" href="profile.html">${staff.avatar_url ? `<img src="${staff.avatar_url}" height="24" style="border-radius:50%;object-fit:cover;width:24px;">` : ""} ${staff.name}</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
          </ul>
        </div>
      </div>
    </nav>`;
  document.getElementById("nav-container").innerHTML = navHtml;
  initNotifications(staff.id);
}

async function loadNotifications(staffId) {
  const { data: notes } = await sb.from("notifications").select("*").eq("staff_id", staffId).order("created_at", { ascending: false }).limit(10);
  const { count: unread } = await sb.from("notifications").select("*", { count: "exact", head: true }).eq("staff_id", staffId).eq("is_read", false);
  const badge = document.getElementById("badge-count");
  if (unread > 0) { badge.textContent = unread; badge.classList.remove("d-none"); }
  else { badge.classList.add("d-none"); }
  const dropdown = document.getElementById("notif-dropdown");
  if (!notes || notes.length === 0) { dropdown.innerHTML = `<li class="text-muted small px-2">No notifications yet.</li>`; return; }
  dropdown.innerHTML = notes.map(n => `
    <li class="px-2 py-1 border-bottom ${n.is_read ? "" : "fw-bold"}" style="cursor:pointer;font-size:.85rem;" onclick="openNotification(${n.id}, ${n.order_id ?? "null"})">
      ${n.message}
      <div class="small text-muted fw-normal">${new Date(n.created_at).toLocaleString()}</div>
    </li>`).join("");
}
async function openNotification(id, orderId) {
  await sb.from("notifications").update({ is_read: true }).eq("id", id);
  window.location.href = orderId ? `order.html?id=${orderId}` : "dashboard.html";
}
function initNotifications(staffId) {
  loadNotifications(staffId);
  sb.channel("notifications-" + staffId)
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "notifications", filter: `staff_id=eq.${staffId}` }, () => loadNotifications(staffId))
    .subscribe();
}

function formatMeasurements(raw) {
  if (!raw) return "—";
  let obj;
  try { obj = JSON.parse(raw); } catch { return raw; }
  if (obj.__freeform) return obj.__freeform;
  const entries = Object.entries(obj);
  if (entries.length === 0) return "—";
  return entries.map(([k, v]) => `${k}: ${v}`).join(", ");
}

const orderId = new URLSearchParams(window.location.search).get("id");
let currentStaff = null;

function fmtDate(d) {
  return d ? new Date(d).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }) : "—";
}

async function loadOrder() {
  const { data: order, error } = await sb
    .from("orders")
    .select("*, customers(name,phone), staff:handled_by(name), assignee:assigned_to(name,phone), payments(*, recorded_by_staff:recorded_by(name))")
    .eq("id", orderId)
    .single();

  if (error || !order) {
    document.getElementById("order-title").textContent = "Order not found.";
    return;
  }

  document.title = `${order.garment_type} — ${order.customers.name}`;
  document.getElementById("order-title").textContent = `${order.garment_type} — ${order.customers.name}`;

  document.getElementById("info-table").innerHTML = `
    <tr><th>Customer</th><td>${order.customers.name} (${order.customers.phone})</td></tr>
    <tr><th>Material</th><td>${order.material_type || "—"} / ${order.material_color || "—"}</td></tr>
    <tr><th>Measurements</th><td>${formatMeasurements(order.measurements)}</td></tr>
    <tr><th>Date Received</th><td>${fmtDate(order.date_received)}</td></tr>
    <tr><th>Agreed Completion</th><td>${fmtDate(order.due_date)}</td></tr>
    <tr><th>Assigned To</th><td>${order.assignee.name} (${order.assignee.phone})</td></tr>
    <tr><th>Logged By</th><td>${order.staff.name}</td></tr>`;

  const totalPaid = order.payments.reduce((s, p) => s + Number(p.amount), 0);
  const balance = Number(order.total_amount) - totalPaid;
  const settings = await getSettings();
  const showPayments = currentStaff.role === "admin" || settings.workers_can_view_payments;

  if (!showPayments) {
    document.getElementById("total-amount").textContent = "—";
    document.getElementById("paid-amount").textContent = "—";
    document.getElementById("balance-amount").textContent = "—";
    document.getElementById("payment-status-badge").innerHTML = `<span class="text-muted small">Payment info not visible to you</span>`;
    document.getElementById("payments-body").innerHTML = `<tr><td colspan="4" class="text-muted small">Payment details are hidden by admin settings.</td></tr>`;
  } else {
    document.getElementById("total-amount").textContent = `KES ${Number(order.total_amount).toFixed(0)}`;
    document.getElementById("paid-amount").textContent = `KES ${totalPaid.toFixed(0)}`;
    const balEl = document.getElementById("balance-amount");
    balEl.textContent = `KES ${balance.toFixed(0)}`;
    balEl.className = "fs-5 " + (balance > 0 ? "text-danger" : "text-success");

    const statusEl = document.getElementById("payment-status-badge");
    if (balance <= 0) statusEl.innerHTML = `<span class="badge bg-success fs-6">Fully Paid</span>`;
    else if (totalPaid > 0) statusEl.innerHTML = `<span class="badge bg-warning text-dark fs-6">Partially Paid</span>`;
    else statusEl.innerHTML = `<span class="badge bg-secondary fs-6">Unpaid</span>`;

    document.getElementById("payments-body").innerHTML = order.payments
      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
      .map(p => `<tr>
        <td>${new Date(p.created_at).toLocaleString()}</td>
        <td>KES ${Number(p.amount).toFixed(0)}</td>
        <td>${p.method}</td>
        <td>${p.recorded_by_staff.name}</td>
      </tr>`).join("") || `<tr><td colspan="4" class="text-muted">No payments yet.</td></tr>`;
  }

  if (currentStaff.role === "admin" && order.status !== "completed") {
    document.getElementById("complete-action").innerHTML = `<button class="btn btn-success btn-sm" id="complete-btn">Mark Completed</button>`;
    document.getElementById("complete-btn").addEventListener("click", async () => {
      if (!confirm("Mark this order as completed?")) return;
      await sb.from("orders").update({ status: "completed", completed_at: new Date().toISOString() }).eq("id", orderId);
      loadOrder();
    });

    if (showPayments) {
      document.getElementById("payment-form-container").innerHTML = `
        <form id="payment-form" class="row g-2 mt-2">
          <div class="col-6"><input type="number" step="0.01" id="pay-amount" class="form-control" placeholder="Amount (KES)" required></div>
          <div class="col-4">
            <select id="pay-method" class="form-select">
              <option value="cash">Cash</option>
              <option value="till">Till/M-Pesa</option>
            </select>
          </div>
          <div class="col-2"><button class="btn btn-dark w-100">Add</button></div>
        </form>`;
      document.getElementById("payment-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const amount = parseFloat(document.getElementById("pay-amount").value);
        const method = document.getElementById("pay-method").value;
        if (!amount || amount <= 0) return;
        await sb.from("payments").insert({ order_id: orderId, amount, method, recorded_by: currentStaff.id });
        loadOrder();
      });
    }
  } else if (order.status === "completed") {
    document.getElementById("complete-action").innerHTML = `<span class="badge bg-success">Completed ${fmtDate(order.completed_at)}</span>`;
  }
}

(async () => {
  currentStaff = await requireAuth();
  if (!currentStaff) return;
  renderNav(currentStaff);
  await loadOrder();
})();
</script>
</body>
</html>
