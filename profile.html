<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root{--paper:#14151A;--ink:#F1EFE8;--thread:#D4AF37;--thread-dark:#B8912A;--brass:#E9CE72;--slate:#9AA0AC;--sage:#4F9A6B;--rust:#C0524A;--panel:#1D1F26;--panel-light:#23252E;--border-soft:rgba(212,175,55,.18);}
body{background:var(--paper);color:var(--ink);font-family:'Work Sans',sans-serif;}
h1,h2,h3,h4,h5,h6{font-family:'Fraunces',serif;}
.brand-title{font-weight:700;}
.topbar{background:var(--panel);display:flex;align-items:center;gap:.65rem;padding:.7rem 1rem;box-shadow:0 2px 10px rgba(0,0,0,.4);position:sticky;top:0;z-index:1030;}
.hamburger-btn{background:none;border:none;color:var(--brass);font-size:1.45rem;cursor:pointer;line-height:1;padding:.15rem .35rem;}
.topbar-brand{font-weight:700;color:var(--brass);font-size:1rem;display:flex;align-items:center;gap:.5rem;text-decoration:none;}
.topbar-brand img{height:30px;width:30px;border-radius:7px;object-fit:cover;background:#fff;padding:2px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:.85rem;}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:1039;}
.sidebar-overlay.show{opacity:1;pointer-events:auto;}
.app-sidebar{position:fixed;top:0;left:0;bottom:0;width:250px;background:var(--panel);transform:translateX(-100%);transition:transform .28s ease;z-index:1040;display:flex;flex-direction:column;padding:1.1rem 0;box-shadow:6px 0 24px rgba(0,0,0,.5);overflow-y:auto;}
.app-sidebar.show{transform:translateX(0);}
.sidebar-brand{font-weight:700;color:var(--brass);font-size:1rem;padding:0 1.15rem 1.1rem;display:flex;align-items:center;gap:.55rem;border-bottom:1px solid var(--border-soft);margin-bottom:.6rem;}
.sidebar-brand img{height:38px;width:38px;border-radius:9px;object-fit:cover;background:#fff;padding:2px;}
.app-sidebar a.side-link{display:flex;align-items:center;gap:.65rem;color:var(--slate);text-decoration:none;padding:.6rem 1.15rem;font-size:.9rem;font-weight:500;border-left:3px solid transparent;}
.app-sidebar a.side-link:hover{background:var(--panel-light);color:var(--ink);}
.app-sidebar a.side-link.active{color:var(--brass);background:var(--panel-light);border-left-color:var(--thread);font-weight:600;}
.sidebar-footer{margin-top:auto;padding-top:.6rem;border-top:1px solid var(--border-soft);}
.sidebar-footer a.side-link{padding:.55rem 1.15rem;}
.nav-link{color:var(--ink)!important;}

.bg-white{background:var(--panel)!important;color:var(--ink);}
.table{color:var(--ink);}
.table thead th{border-bottom-color:var(--border-soft)!important;color:var(--brass);}
.table td, .table th{border-color:rgba(255,255,255,.06);}
.form-control,.form-select{background:var(--panel-light)!important;color:var(--ink)!important;border-color:var(--border-soft)!important;}
.form-control::placeholder{color:var(--slate);}
.form-control:focus,.form-select:focus{border-color:var(--thread)!important;box-shadow:0 0 0 .2rem rgba(212,175,55,.15)!important;}
.dropdown-menu{background:var(--panel);border-color:var(--border-soft);}
.dropdown-item{color:var(--ink);}
.dropdown-item:hover{background:var(--panel-light);color:var(--brass);}
.text-muted{color:var(--slate)!important;}
.btn-dark{background:var(--thread)!important;border-color:var(--thread)!important;color:#14151A!important;}
.btn-dark:hover{background:var(--thread-dark)!important;border-color:var(--thread-dark)!important;}
.btn-outline-dark{color:var(--brass)!important;border-color:var(--brass)!important;}
.btn-outline-dark:hover{background:var(--brass)!important;color:#14151A!important;}
.modal-content{background:var(--panel);color:var(--ink);}
.alert{border:1px solid var(--border-soft);}
</style>
</head>
<body>
<div id="nav-container"></div>
<div class="container py-4">
  <h3 class="page-title">My Profile</h3>
  <div id="msg-box" class="alert d-none"></div>

  <div class="card p-4 shadow-sm bg-white" style="max-width:480px;">
    <div class="text-center mb-3">
      <img id="avatar-preview" class="avatar-preview" src="" alt="Profile photo">
    </div>
    <form id="profile-form">
      <div class="mb-3">
        <label class="form-label">Profile Photo</label>
        <input type="file" id="avatar-file" class="form-control" accept="image/*">
      </div>
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" id="name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com">
        <div class="form-text">Contact email — this does not change your login.</div>
      </div>
      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="text" id="phone" class="form-control" placeholder="07XXXXXXXX" required>
      </div>
      <button class="btn btn-dark w-100" type="submit">Save Changes</button>
    </form>
  </div>

  <div class="card p-4 shadow-sm bg-white mt-3" style="max-width:480px;">
    <h6 class="text-muted mb-3">Change Password</h6>
    <form id="password-form">
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password" id="new-password" class="form-control" minlength="6" required placeholder="At least 6 characters">
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm New Password</label>
        <input type="password" id="confirm-password" class="form-control" minlength="6" required>
      </div>
      <button class="btn btn-outline-dark w-100" type="submit">Update Password</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://zyzyatnnzrztdwqujkgl.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5enlhdG5uenJ6dGR3cXVqa2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0MTQ3MjksImV4cCI6MjA5OTk5MDcyOX0.-BF4qH0fVfdfxZ9IR1LzNWcFec4A6FIznBryjGywfVU";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function logout() {
  await sb.auth.signOut();
  window.location.href = "index.html";
}
async function getCurrentStaff() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return null;
  const { data, error } = await sb.from("staff").select("*").eq("id", session.user.id).single();
  if (error || !data || !data.active) return null;
  return data;
}
async function requireAuth({ adminOnly = false } = {}) {
  const staff = await getCurrentStaff();
  if (!staff) { window.location.href = "index.html"; return null; }
  if (adminOnly && staff.role !== "admin") { window.location.href = "dashboard.html"; return null; }
  return staff;
}
async function getSettings() {
  const { data } = await sb.from("system_settings").select("*").limit(1).single();
  return data || { system_name: "Tailor Manager", logo_url: null };
}
function orderNo(id) {
  return String(id).padStart(3, "0");
}
async function renderNav(staff) {
  const settings = await getSettings();
  document.title = settings.system_name;
  const isAdmin = staff.role === "admin";
  const showFinancials = isAdmin || settings.workers_can_view_financials;
  const currentPage = window.location.pathname.split("/").pop();

  const links = [
    { href: "dashboard.html", label: "Dashboard", show: true },
    { href: "orders.html", label: "Orders", show: true },
    { href: "trash.html", label: "Trash", show: true },
    { href: "new-order.html", label: "+ New Order", show: isAdmin || settings.workers_can_create_orders },
    { href: "financials.html", label: "Financials", show: showFinancials },
    { href: "admin.html", label: "Admin Settings", show: isAdmin },
  ];

  const linksHtml = links.filter(l => l.show).map(l =>
    `<a class="side-link${currentPage === l.href ? " active" : ""}" href="${l.href}"><span>&#8226;</span> ${l.label}</a>`
  ).join("");

  const logoHtml = settings.logo_url ? `<img src="${settings.logo_url}" alt="logo">` : "&#9986;";

  const navHtml = `
    <div class="topbar">
      <button class="hamburger-btn" id="sidebarToggle">&#9776;</button>
      <a class="topbar-brand" href="dashboard.html">${logoHtml} ${settings.system_name}</a>
      <div class="topbar-right">
        <div class="dropdown">
          <a class="nav-link position-relative" href="#" id="bell" role="button" data-bs-toggle="dropdown" onclick="markAllAsRead()">
            &#128276;<span id="badge-count" class="badge rounded-pill bg-danger position-absolute d-none" style="top:0;right:0;font-size:.65rem;"></span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end p-2" style="min-width:320px;max-height:400px;overflow-y:auto;" id="notif-dropdown">
            <li class="text-muted small px-2">Loading...</li>
          </ul>
        </div>
        <a class="nav-link" href="profile.html">${staff.avatar_url ? `<img src="${staff.avatar_url}" height="24" style="border-radius:50%;object-fit:cover;width:24px;">` : ""}</a>
      </div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="app-sidebar" id="appSidebar">
      <div class="sidebar-brand">${logoHtml} ${settings.system_name}</div>
      ${linksHtml}
      <div class="sidebar-footer">
        <a class="side-link" href="profile.html">&#8226; ${staff.name} (Profile)</a>
        <a class="side-link" href="#" onclick="logout()">&#8226; Logout</a>
      </div>
    </div>`;
  document.getElementById("nav-container").innerHTML = navHtml;

  const sbToggle = document.getElementById("sidebarToggle");
  const sbEl = document.getElementById("appSidebar");
  const sbOverlay = document.getElementById("sidebarOverlay");
  function toggleSidebar() { sbEl.classList.toggle("show"); sbOverlay.classList.toggle("show"); }
  sbToggle.addEventListener("click", toggleSidebar);
  sbOverlay.addEventListener("click", toggleSidebar);
  initNotifications(staff.id);
}

let currentNotifStaffId = null;

async function loadNotifications(staffId) {
  currentNotifStaffId = staffId;
  const { data: notes } = await sb.from("notifications").select("*").eq("staff_id", staffId).order("created_at", { ascending: false }).limit(15);
  const { count: unread } = await sb.from("notifications").select("*", { count: "exact", head: true }).eq("staff_id", staffId).eq("is_read", false);
  const badge = document.getElementById("badge-count");
  if (unread > 0) { badge.textContent = unread; badge.classList.remove("d-none"); }
  else { badge.classList.add("d-none"); }
  const dropdown = document.getElementById("notif-dropdown");
  if (!notes || notes.length === 0) { dropdown.innerHTML = `<li class="text-muted small px-2">No notifications yet.</li>`; return; }
  const clearBtn = `<li class="px-2 pb-2 mb-1 border-bottom"><button class="btn btn-sm btn-outline-dark w-100" onclick="clearAllNotifications()">Clear All</button></li>`;
  dropdown.innerHTML = clearBtn + notes.map(n => `
    <li class="px-2 py-1 border-bottom ${n.is_read ? "" : "fw-bold"}" style="cursor:pointer;font-size:.85rem;" onclick="openNotification(${n.id}, ${n.order_id ?? "null"})">
      ${n.message}
      <div class="small text-muted fw-normal">${new Date(n.created_at).toLocaleString()}</div>
    </li>`).join("");
}
async function openNotification(id, orderId) {
  await sb.from("notifications").update({ is_read: true }).eq("id", id);
  window.location.href = orderId ? `order.html?id=${orderId}` : "dashboard.html";
}
async function markAllAsRead() {
  if (!currentNotifStaffId) return;
  const badge = document.getElementById("badge-count");
  if (badge) badge.classList.add("d-none");
  await sb.from("notifications").update({ is_read: true }).eq("staff_id", currentNotifStaffId).eq("is_read", false);
  loadNotifications(currentNotifStaffId);
}
async function clearAllNotifications() {
  if (!currentNotifStaffId) return;
  if (!confirm("Clear all notifications? This can't be undone.")) return;
  await sb.from("notifications").delete().eq("staff_id", currentNotifStaffId);
  loadNotifications(currentNotifStaffId);
}
function initNotifications(staffId) {
  loadNotifications(staffId);
  sb.channel("notifications-" + staffId)
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "notifications", filter: `staff_id=eq.${staffId}` }, () => loadNotifications(staffId))
    .subscribe();
}

let me = null;

function showMsg(text, isError) {
  const box = document.getElementById("msg-box");
  box.textContent = text;
  box.className = "alert " + (isError ? "alert-danger" : "alert-success");
}

(async () => {
  me = await requireAuth();
  if (!me) return;
  renderNav(me);

  document.getElementById("name").value = me.name;
  document.getElementById("email").value = me.email || "";
  document.getElementById("phone").value = me.phone;
  document.getElementById("avatar-preview").src = me.avatar_url || "https://placehold.co/100x100/F3EEE4/7A2E33?text=" + encodeURIComponent(me.name[0] || "?");
})();

document.getElementById("profile-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const file = document.getElementById("avatar-file").files[0];
  let avatarUrl = me.avatar_url;

  try {
    if (file) {
      const ext = file.name.split(".").pop();
      const path = `avatars/${me.id}-${Date.now()}.${ext}`;
      const { error: uploadErr } = await sb.storage.from("public-assets").upload(path, file, { upsert: true });
      if (uploadErr) throw uploadErr;
      const { data: urlData } = sb.storage.from("public-assets").getPublicUrl(path);
      avatarUrl = urlData.publicUrl;
    }

    const { error } = await sb.from("staff").update({
      name: document.getElementById("name").value.trim(),
      email: document.getElementById("email").value.trim() || null,
      phone: document.getElementById("phone").value.trim(),
      avatar_url: avatarUrl,
    }).eq("id", me.id);
    if (error) throw error;

    showMsg("Profile updated.", false);
    setTimeout(() => location.reload(), 1000);
  } catch (err) {
    showMsg("Failed to update: " + err.message, true);
  }
});

document.getElementById("password-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const pw1 = document.getElementById("new-password").value;
  const pw2 = document.getElementById("confirm-password").value;
  if (pw1 !== pw2) { showMsg("Passwords don't match.", true); return; }
  if (pw1.length < 6) { showMsg("Password must be at least 6 characters.", true); return; }
  try {
    const { error } = await sb.auth.updateUser({ password: pw1 });
    if (error) throw error;
    showMsg("Password updated.", false);
    document.getElementById("password-form").reset();
  } catch (err) {
    showMsg("Failed to update password: " + err.message, true);
  }
});
</script>
</body>
</html>
