<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tailor Manager — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root{--paper:#14151A;--ink:#F1EFE8;--thread:#D4AF37;--thread-dark:#B8912A;--brass:#E9CE72;--slate:#9AA0AC;--sage:#C9A227;--rust:#8C6A2F;--panel:#1D1F26;--panel-light:#23252E;--border-soft:rgba(212,175,55,.18);}
body{background:var(--paper);color:var(--ink);font-family:'Work Sans',sans-serif;}
h1,h2,h3,h4,h5,h6,.navbar-brand{font-family:'Fraunces',serif;}
table,.badge,input[type=number],input[type=date],input[type=time]{font-family:'JetBrains Mono',monospace;}
.card{background:var(--panel);border:none;border-radius:6px;box-shadow:0 4px 10px rgba(33,29,26,.10);}
.btn-dark{background:var(--thread);border-color:var(--thread);border-radius:999px;font-weight:600;letter-spacing:.02em;}
.btn-dark:hover{background:var(--thread-dark);border-color:var(--thread-dark);}
.form-control,.form-select{border-radius:8px;border:1px solid #DDD4C4;background:#FFFDF9;}
.form-control:focus,.form-select:focus{border-color:var(--thread);box-shadow:0 0 0 .2rem rgba(122,46,51,.12);}
.brand-title{font-weight:700;}
.nav-scroll{overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.nav-scroll::-webkit-scrollbar{display:none;}
.nav-pill{display:inline-block;color:var(--paper);opacity:.8;text-decoration:none;padding:.4rem .75rem;border-radius:999px;font-size:.85rem;margin-right:.25rem;white-space:nowrap;}
.nav-pill:hover{opacity:1;background:rgba(255,255,255,.08);}
.nav-pill.active{opacity:1;background:rgba(255,255,255,.15);color:#fff;font-weight:600;}

.bg-white{background:var(--panel)!important;color:var(--ink);}
.form-control,.form-select{background:var(--panel-light)!important;color:var(--ink)!important;border-color:var(--border-soft)!important;}
.form-control::placeholder{color:var(--slate);}
.form-control:focus{border-color:var(--thread)!important;box-shadow:0 0 0 .2rem rgba(212,175,55,.15)!important;}
.btn-dark{background:var(--thread)!important;border-color:var(--thread)!important;color:#14151A!important;}
.btn-dark:hover{background:var(--thread-dark)!important;border-color:var(--thread-dark)!important;}
.text-muted{color:var(--slate)!important;}
.bg-white{background-color:var(--panel)!important;}
.text-success{color:var(--sage)!important;}
.text-danger{color:var(--rust)!important;}
.text-muted{color:var(--slate)!important;}
.btn-danger{background-color:var(--rust)!important;border-color:var(--rust)!important;color:#fff!important;border-radius:999px;}
.btn-danger:hover{filter:brightness(1.15);}
.btn-success{background-color:var(--sage)!important;border-color:var(--sage)!important;color:#14151A!important;border-radius:999px;font-weight:600;}
.btn-success:hover{filter:brightness(1.1);}
.table{--bs-table-bg:transparent;--bs-table-color:var(--ink);color:var(--ink);}
.table-hover>tbody>tr:hover>*{--bs-table-accent-bg:rgba(212,175,55,.08);color:var(--ink);}
.alert-danger{background-color:rgba(140,106,47,.15)!important;border-color:var(--rust)!important;color:var(--ink)!important;}
.alert-success{background-color:rgba(201,162,39,.15)!important;border-color:var(--sage)!important;color:var(--ink)!important;}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem 1rem;}
.auth-logo{height:64px;width:64px;border-radius:16px;object-fit:cover;background:#fff;padding:4px;margin:0 auto 1rem;display:block;}
.auth-logo-fallback{height:64px;width:64px;border-radius:16px;background:var(--panel-light);border:1px solid var(--border-soft);display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 1rem;}
#brand-title{color:var(--brass)!important;font-size:1.6rem;letter-spacing:.01em;}
.auth-subtitle{color:var(--ink)!important;opacity:.75;}
.password-field-wrap{position:relative;}
.password-toggle{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--slate);cursor:pointer;padding:.25rem;line-height:1;}
.password-toggle:hover{color:var(--brass);}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <div id="logo-slot"></div>
            <h4 class="mb-1 text-center brand-title" id="brand-title">Tailor Manager</h4>
            <p class="auth-subtitle text-center small">Log in with your email — works for both staff and admin.</p>
            <div id="error-box" class="alert alert-danger d-none"></div>
            <form id="login-form">
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="you@example.com" required autofocus>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="password-field-wrap">
                  <input type="password" id="password" class="form-control pe-5" required>
                  <button type="button" class="password-toggle" id="password-toggle" aria-label="Show password">
                    <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                  </button>
                </div>
              </div>
              <button class="btn btn-dark w-100" type="submit">Login</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ---------- Supabase config: update these two lines if the project changes ----------
const SUPABASE_URL = "https://zyzyatnnzrztdwqujkgl.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5enlhdG5uenJ6dGR3cXVqa2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0MTQ3MjksImV4cCI6MjA5OTk5MDcyOX0.-BF4qH0fVfdfxZ9IR1LzNWcFec4A6FIznBryjGywfVU";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function phoneToEmail(phone) {
  const digits = phone.replace(/\D/g, "");
  return `${digits}@tailor.local`;
}
async function getCurrentStaff() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return null;
  const { data, error } = await sb.from("staff").select("*").eq("id", session.user.id).single();
  if (error || !data || !data.active) return null;
  return data;
}
async function getSettings() {
  const { data } = await sb.from("system_settings").select("*").limit(1).single();
  return data || { system_name: "Tailor Manager", logo_url: null };
}
function orderNo(id) {
  return String(id).padStart(3, "0");
}
async function loginWithEmail(email, password) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) throw error;
  return data;
}

(async () => {
  const settings = await getSettings().catch(() => null);
  if (settings) {
    document.getElementById("brand-title").textContent = settings.system_name;
    document.title = settings.system_name + " — Login";
    document.getElementById("logo-slot").innerHTML = settings.logo_url
      ? `<img src="${settings.logo_url}" alt="logo" class="auth-logo">`
      : `<div class="auth-logo-fallback">&#9986;</div>`;
  } else {
    document.getElementById("logo-slot").innerHTML = `<div class="auth-logo-fallback">&#9986;</div>`;
  }
  const staff = await getCurrentStaff();
  if (staff) window.location.href = "dashboard.html";
})();

document.getElementById("password-toggle").addEventListener("click", () => {
  const pw = document.getElementById("password");
  const btn = document.getElementById("password-toggle");
  const showing = pw.type === "text";
  pw.type = showing ? "password" : "text";
  btn.setAttribute("aria-label", showing ? "Show password" : "Hide password");
  document.getElementById("eye-icon").innerHTML = showing
    ? `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`
    : `<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a20.3 20.3 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a20.3 20.3 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><path d="M1 1l22 22"></path>`;
});

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errorBox = document.getElementById("error-box");
  errorBox.classList.add("d-none");
  try {
    await loginWithEmail(email, password);
    window.location.href = "dashboard.html";
  } catch (err) {
    errorBox.textContent = "Invalid email or password.";
    errorBox.classList.remove("d-none");
  }
});
</script>
</body>
</html>
