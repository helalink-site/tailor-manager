<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tailor Manager — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root{--paper:#F3EEE4;--ink:#211D1A;--thread:#7A2E33;--thread-dark:#5E2227;--brass:#B7924B;--slate:#5B6560;--sage:#4F7A5B;--rust:#B5542A;}
body{background:var(--paper);color:var(--ink);font-family:'Work Sans',sans-serif;}
h1,h2,h3,h4,h5,h6,.navbar-brand{font-family:'Fraunces',serif;}
table,.badge,input[type=number],input[type=date],input[type=time]{font-family:'JetBrains Mono',monospace;}
.card{background:#fff;border:none;border-radius:6px;box-shadow:0 1px 3px rgba(33,29,26,.08);}
.btn-dark{background:var(--thread);border-color:var(--thread);border-radius:999px;font-weight:600;letter-spacing:.02em;}
.btn-dark:hover{background:var(--thread-dark);border-color:var(--thread-dark);}
.form-control,.form-select{border-radius:8px;border:1px solid #DDD4C4;background:#FFFDF9;}
.form-control:focus,.form-select:focus{border-color:var(--thread);box-shadow:0 0 0 .2rem rgba(122,46,51,.12);}
.brand-title{font-style:italic;font-weight:700;}
.nav-scroll{overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.nav-scroll::-webkit-scrollbar{display:none;}
.nav-pill{display:inline-block;color:var(--paper);opacity:.8;text-decoration:none;padding:.4rem .75rem;border-radius:999px;font-size:.85rem;margin-right:.25rem;white-space:nowrap;}
.nav-pill:hover{opacity:1;background:rgba(255,255,255,.08);}
.nav-pill.active{opacity:1;background:rgba(255,255,255,.15);color:#fff;font-weight:600;}
</style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4 mt-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h4 class="mb-1 text-center brand-title" id="brand-title">Tailor Manager</h4>
          <p class="text-muted text-center small">Log in with your email — works for both staff and admin.</p>
          <div id="error-box" class="alert alert-danger d-none"></div>
          <form id="login-form">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" id="email" class="form-control" placeholder="you@example.com" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" id="password" class="form-control" required>
            </div>
            <button class="btn btn-dark w-100" type="submit">Login</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ---------- Supabase config: update these two lines if the project changes ----------
const SUPABASE_URL = "https://zyzyatnnzrztdwqujkgl.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5enlhdG5uenJ6dGR3cXVqa2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0MTQ3MjksImV4cCI6MjA5OTk5MDcyOX0.-BF4qH0fVfdfxZ9IR1LzNWcFec4A6FIznBryjGywfVU";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function phoneToEmail(phone) {
  const digits = phone.replace(/\D/g, "");
  return `${digits}@tailor.local`;
}
async function getCurrentStaff() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return null;
  const { data, error } = await sb.from("staff").select("*").eq("id", session.user.id).single();
  if (error || !data || !data.active) return null;
  return data;
}
async function getSettings() {
  const { data } = await sb.from("system_settings").select("*").limit(1).single();
  return data || { system_name: "Tailor Manager", logo_url: null };
}
function orderNo(id) {
  return String(id).padStart(3, "0");
}
async function loginWithEmail(email, password) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) throw error;
  return data;
}

(async () => {
  const settings = await getSettings().catch(() => null);
  if (settings) {
    document.getElementById("brand-title").textContent = settings.system_name;
    document.title = settings.system_name + " — Login";
  }
  const staff = await getCurrentStaff();
  if (staff) window.location.href = "dashboard.html";
})();

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errorBox = document.getElementById("error-box");
  errorBox.classList.add("d-none");
  try {
    await loginWithEmail(email, password);
    window.location.href = "dashboard.html";
  } catch (err) {
    errorBox.textContent = "Invalid email or password.";
    errorBox.classList.remove("d-none");
  }
});
</script>
</body>
</html>
